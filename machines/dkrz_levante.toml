# DKRZ Levante cluster (equivalent to ./install_dkrz.sh).

[machine]
name = "dkrz_levante"

[utils.config]
ifx = "dkrz_levante_ifx"

[compilers.ifx]
CC = "icx"
F77 = "ifx"
# Levante compute nodes are AMD EPYC 7763 (Milan/Zen3), AVX2 with no AVX-512.
# (The login-node gcc is too old to name Zen3 and mis-resolves -march=native to
# znver1 -- confirm with lscpu, not gcc.)
FFLAGS = "-Ofast -march=znver3 -traceback"
CFLAGS = "-Ofast -march=znver3 -traceback"
# ifx needs explicit Intel runtime libs at the fftw/lis link stage.
# build.py derives the lib dir from `icx -print-file-name=libimf.so` and sets ac_cv_c_libs accordingly.
intel_runtime_libs = true

[compilers.ifort]
CC = "icc"
F77 = "ifort"
FFLAGS = "-Ofast -march=znver3 -traceback"
CFLAGS = "-Ofast -march=znver3 -traceback"

[compilers.gfortran]
