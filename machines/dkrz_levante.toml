# DKRZ Levante cluster (equivalent to ./install_dkrz.sh).

[machine]
name = "dkrz_levante"

[utils.config]
ifx = "dkrz_levante_ifx"

[compilers.ifx]
CC = "icx"
F77 = "ifx"
# ifx needs explicit Intel runtime libs at the fftw/lis link stage.
# build.py derives the lib dir from `icx -print-file-name=libimf.so` and sets ac_cv_c_libs accordingly.
intel_runtime_libs = true

[compilers.ifort]
CC = "icc"
F77 = "ifort"
FFLAGS = "-Ofast -march=core-avx2 -mtune=core-avx2 -traceback"
CFLAGS = "-Ofast -march=core-avx2 -mtune=core-avx2 -traceback"

[compilers.gfortran]
