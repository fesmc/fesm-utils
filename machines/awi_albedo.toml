# AWI Albedo cluster (equivalent to ./install_awi.sh, which is a symlink to
# install_dkrz.sh -- so the fftw/lis configure settings are identical to DKRZ).

[machine]
name = "awi_albedo"

[utils.config]
ifx = "awi_albedo_ifx"

[compilers.ifx]
CC = "icx"
F77 = "ifx"
# Albedo compute nodes (mpp/smp) are uniformly AMD EPYC 7702 (Rome/Zen2),
# AVX2 with no AVX-512 -- so znver2 is a pure tuning win with no ISA risk.
FFLAGS = "-Ofast -march=znver2 -traceback"
CFLAGS = "-Ofast -march=znver2 -traceback"
intel_runtime_libs = true

[compilers.ifort]
CC = "icc"
F77 = "ifort"
FFLAGS = "-Ofast -march=znver2 -traceback"
CFLAGS = "-Ofast -march=znver2 -traceback"

[compilers.gfortran]
