# AWI Albedo cluster (equivalent to ./install_awi.sh, which is a symlink to
# install_dkrz.sh -- so the fftw/lis configure settings are identical to DKRZ).
#
# NOTE: unlike dkrz_levante, no ac_cv_c_libs override is set here. The previous
# value was copied from Levante and pointed at Levante spack trees that do not
# exist on Albedo. If an ifx fftw/lis build fails at the link stage with missing
# Intel runtime symbols (svml, irc, imf, ...), add an ac_cv_c_libs entry with
# Albedo's own Intel/GCC runtime library paths (see machines/TEMPLATE.toml).

[machine]
name = "awi_albedo"

[utils.config]
ifx = "awi_albedo_ifx"

[compilers.ifx]
CC = "icx"
F77 = "ifx"

[compilers.ifort]
CC = "icc"
F77 = "ifort"
FFLAGS = "-Ofast -march=core-avx2 -mtune=core-avx2 -traceback"
CFLAGS = "-Ofast -march=core-avx2 -mtune=core-avx2 -traceback"

[compilers.gfortran]
