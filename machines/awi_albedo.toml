# AWI Albedo cluster (equivalent to ./install_awi.sh, which is a symlink to
# install_dkrz.sh -- so the fftw/lis configure settings are identical to DKRZ).
#
# ifx uses intel_runtime_libs (see [compilers.ifx]): build.py derives the Intel
# runtime lib dir from the compiler itself, so no machine-specific paths need to
# be pasted here. This replaces the old hard-coded ac_cv_c_libs that was copied
# from Levante and pointed at spack trees that do not exist on Albedo.

[machine]
name = "awi_albedo"

[utils.config]
ifx = "awi_albedo_ifx"

[compilers.ifx]
CC = "icx"
F77 = "ifx"
intel_runtime_libs = true

[compilers.ifort]
CC = "icc"
F77 = "ifort"
FFLAGS = "-Ofast -march=core-avx2 -mtune=core-avx2 -traceback"
CFLAGS = "-Ofast -march=core-avx2 -mtune=core-avx2 -traceback"

[compilers.gfortran]
