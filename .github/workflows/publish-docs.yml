name: Publish docs

# Render the Quarto site in docs/ and publish it to the gh-pages branch.
# Publishing is driven by `dev`: any push that touches docs/ (or this workflow)
# re-renders and publishes the site. Figures are committed PNGs, so the build
# needs only Quarto — no Julia, Fortran, or netCDF toolchain.

on:
  push:
    branches: [dev]
    paths:
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
